<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeddBoard</title>
  <style>
:root {
  --bg-a: #1a1210;
  --bg-b: #2a1e18;
  --panel-a: #3a2a1f;
  --panel-b: #2b2018;
  --tile-a: #5b4430;
  --tile-b: #3e2d20;
  --tile-text: #f3e5c8;
  --tile-border: #d4b88a66;
  --ink: #f2e6cc;
  --accent: #c89a43;
  --accent-bright: #f0c76d;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  font-family: "Palatino Linotype", "Book Antiqua", Palatino, "Times New Roman", serif;
  background:
    radial-gradient(circle at 15% 10%, #ffffff12 0 12%, transparent 30%),
    radial-gradient(circle at 85% 90%, #00000035 0 16%, transparent 38%),
    repeating-linear-gradient(135deg, #00000012 0 2px, transparent 2px 7px),
    linear-gradient(165deg, var(--bg-a), var(--bg-b));
  color: var(--ink);
}

.app {
  min-height: 100dvh;
  padding: 14px;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 12px;
}

.header {
  text-align: center;
  padding: 10px 12px;
  border: 1px solid #d9ba883f;
  border-radius: 12px;
  background:
    linear-gradient(180deg, #513824d9, #2d2119d9),
    linear-gradient(90deg, #00000030, transparent 20%, transparent 80%, #00000030);
  box-shadow: inset 0 0 0 1px #f8d89b22;
}

.header h1 {
  margin: 0;
  font-size: clamp(1.2rem, 2.6vw, 2rem);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent-bright);
  text-shadow: 0 1px 0 #000, 0 0 14px #d09b3730;
}

.header p {
  margin: 4px 0 0;
  opacity: 0.9;
  font-size: clamp(0.8rem, 1.8vw, 0.95rem);
  color: #f6e7c7;
}

.reaction {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(52vw, 360px);
  max-height: 48vh;
  opacity: 0;
  pointer-events: none;
  visibility: hidden;
  transition: opacity 160ms ease;
  z-index: 30;
}

.reaction.visible {
  opacity: 1;
  visibility: visible;
}

.reaction-img {
  display: block;
  width: 100%;
  height: auto;
  object-fit: contain;
}

.reaction-img--bottom {
  position: relative;
  z-index: 31;
}

.reaction-img--top {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 32;
}

.reaction.visible .reaction-img--top {
  animation: tp-flap 220ms steps(2, end) infinite;
}

@keyframes tp-flap {
  0%   { transform: translateY(0) rotate(0deg); }
  50%  { transform: translateY(-32px) rotate(-6deg); }
  100% { transform: translateY(0) rotate(0deg); }
}

.board {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(clamp(120px, 22vw, 220px), 1fr));
  gap: 12px;
  align-content: stretch;
}

.tile {
  border: 1px solid var(--tile-border);
  border-radius: 10px;
  background:
    linear-gradient(180deg, #f7d7930f 0 20%, transparent 55%),
    linear-gradient(150deg, var(--tile-a), var(--tile-b));
  color: var(--tile-text);
  font-size: clamp(0.9rem, 2.2vw, 1.2rem);
  font-weight: 700;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  padding: 12px;
  width: 100%;
  min-height: 88px;
  cursor: pointer;
  box-shadow: inset 0 0 0 1px #f0d59a1f, 0 8px 14px #00000045;
  transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
}

.tile:hover {
  transform: translateY(-2px);
  box-shadow: inset 0 0 0 1px #f0d59a33, 0 12px 18px #00000052;
}

.tile:active,
.tile.playing {
  transform: scale(0.98);
  filter: saturate(1.1) brightness(1.08);
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

@media (max-width: 640px) {
  .app {
    padding: 10px;
  }

  .reaction {
    width: min(72vw, 320px);
  }

  .reaction-img--top {
    width: 100%;
  }

  .board {
    gap: 8px;
    grid-template-columns: repeat(auto-fit, minmax(42vw, 1fr));
  }

  .tile {
    min-height: 94px;
  }
}
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>WeddBoard</h1>
      <p>Choose your battle call.</p>
    </header>
    <div id="reaction" class="reaction" aria-hidden="true">
      <img id="reaction-bottom" class="reaction-img reaction-img--bottom" alt="" />
      <img id="reaction-top" class="reaction-img reaction-img--top" alt="" />
    </div>
    <section id="board" class="board" aria-label="Soundboard tiles"></section>
  </main>

  <script>
/* soundboard.js */
(() => {
  const board = document.getElementById("board");
  const reaction = document.getElementById("reaction");
  const reactionTop = document.getElementById("reaction-top");
  const reactionBottom = document.getElementById("reaction-bottom");
  const data = Array.isArray(window.SOUND_DATA) ? window.SOUND_DATA : [];
  const topImageDataUrl =
    typeof window.REACTION_TOP_IMAGE_DATA_URL === "string"
      ? window.REACTION_TOP_IMAGE_DATA_URL
      : "";
  const bottomImageDataUrl =
    typeof window.REACTION_BOTTOM_IMAGE_DATA_URL === "string"
      ? window.REACTION_BOTTOM_IMAGE_DATA_URL
      : "";

  if (!board) {
    return;
  }

  if (data.length === 0) {
    board.innerHTML = '<p role="status">No embedded sounds found.</p>';
    return;
  }

  const soundAnimations = (typeof window.SOUND_ANIMATIONS === "object" && window.SOUND_ANIMATIONS) || {};

  let currentAudio = null;
  let currentButton = null;

  function applyTopAnimation(item) {
    if (!reactionTop) return;
    const anim = soundAnimations[item.name];
    // Clear any existing animation and force a reflow so it restarts cleanly.
    reactionTop.style.animation = "none";
    void reactionTop.offsetWidth;
    if (anim) {
      reactionTop.style.animation =
        `${anim.animName} ${anim.duration}s step-end 1 forwards`;
    } else {
      // No per-sound data — fall back to CSS class rule (tp-flap).
      reactionTop.style.animation = "";
    }
  }

  function clearTopAnimation() {
    if (!reactionTop) return;
    reactionTop.style.animation = "";
  }

  if (reactionTop && topImageDataUrl) {
    reactionTop.src = topImageDataUrl;
  }

  if (reactionBottom && bottomImageDataUrl) {
    reactionBottom.src = bottomImageDataUrl;
  }

  if (!topImageDataUrl && !bottomImageDataUrl && reaction) {
    reaction.style.display = "none";
  }

  function showReaction() {
    if (reaction) {
      reaction.classList.add("visible");
    }
  }

  function hideReaction() {
    if (reaction) {
      reaction.classList.remove("visible");
    }
  }

  function stopCurrent() {
    if (!currentAudio) {
      if (currentButton) {
        currentButton.classList.remove("playing");
        currentButton = null;
      }
      hideReaction();
      return;
    }
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
    if (currentButton) {
      currentButton.classList.remove("playing");
      currentButton = null;
    }
    hideReaction();
    clearTopAnimation();
  }

  function playSound(item, button) {
    stopCurrent();

    const audio = new Audio(`data:${item.mime};base64,${item.base64}`);
    currentAudio = audio;
    currentButton = button;

    button.classList.add("playing");
    showReaction();
    applyTopAnimation(item);
    audio.addEventListener("ended", () => {
      button.classList.remove("playing");
      hideReaction();
      clearTopAnimation();
      if (currentAudio === audio) {
        currentAudio = null;
      }
      if (currentButton === button) {
        currentButton = null;
      }
    });
    audio.addEventListener("error", () => {
      button.classList.remove("playing");
      hideReaction();
      clearTopAnimation();
      if (currentAudio === audio) {
        currentAudio = null;
      }
      if (currentButton === button) {
        currentButton = null;
      }
    });

    audio.play().catch(() => {
      button.classList.remove("playing");
      hideReaction();
      clearTopAnimation();
      if (currentAudio === audio) {
        currentAudio = null;
      }
      if (currentButton === button) {
        currentButton = null;
      }
    });
  }

  for (const item of data) {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "tile";
    button.textContent = item.name;
    button.setAttribute("aria-label", `Play ${item.name}`);
    button.addEventListener("click", () => playSound(item, button));
    board.appendChild(button);
  }
})();

  </script>
